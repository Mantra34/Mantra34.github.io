<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Para ti 💌</title>
  <link rel="icon" type="image/x-icon" href="corazon.ico" />


  <!-- Fuentes: una display romántica + una sans-serif suave para cuerpo -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Quicksand:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Fondo de nubes y brillos -->
  <div class="sky" aria-hidden="true">
    <div class="cloud cloud--1"></div>
    <div class="cloud cloud--2"></div>
    <div class="cloud cloud--3"></div>
    <div class="cloud cloud--4"></div>
    <div class="sparkles" id="sparkles"></div>
  </div>

  <main class="stage">
    <p class="eyebrow">para la persona que quiero</p>
    <h1 class="title">Un mensajito para ti</h1>
    <p class="subtitle">Toca el corazón cuando quieras saber algo bonito.</p>

    <!-- Botón principal en forma de corazón / sobre -->
    <button id="loveButton" class="love-button" aria-label="Toca para recibir un mensaje">
      <span class="love-button__heart">💗</span>
      <span class="love-button__ring"></span>
    </button>

    <!-- Tarjeta donde aparece el mensaje -->
    <section id="messageCard" class="message-card" aria-live="polite">
      <p id="messageText" class="message-card__text">Toca el corazón para empezar…</p>
    </section>

    <p class="counter" id="counterText"></p>
  </main>

  <!-- Modal del evento especial -->
  <div id="specialOverlay" class="special-overlay" aria-hidden="true">
    <div class="special-overlay__petals" id="petals"></div>
    <div class="special-card" role="dialog" aria-modal="true" aria-labelledby="specialTitle">
      <p class="special-card__eyebrow">✨ mensaje especial ✨</p>
      <h2 id="specialTitle" class="special-card__title">Encontraste algo escondido</h2>
      <p id="specialText" class="special-card__text"></p>
      <button id="closeSpecial" class="special-card__close">Cerrar con cariño</button>
    </div>
  </div>

  <!-- Audio del evento especial: coloca tu archivo mp3 en assets/audio/cancion-especial.mp3 -->
  <audio id="specialAudio" src="assets/audio/cancion-especial.mp3" preload="none"></audio>

  <script src="script.js"></script>
</body>
</html>
